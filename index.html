<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gudang Minimal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

</head>
<body class="bg-light">

<div id="app" class="container py-4">

  <h3 class="text-center mb-4">📦 Data Barang</h3>

  <!-- FORM TAMBAH -->
  <div class="card mb-3">
    <div class="card-body">
      <input v-model="nama" class="form-control mb-2" placeholder="Nama barang">
      <button class="btn btn-primary w-100" @click="tambah">Tambah Barang</button>
    </div>
  </div>

  <!-- LIST BARANG -->
  <div class="card">
    <div class="card-body">

      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Nama Barang</th>
            <th width="150">Aksi</th>
          </tr>
        </thead>

        <tbody>
          <tr v-for="(item,index) in items" :key="index">
            <td>
              <span v-if="editIndex !== index">{{ item.nama }}</span>
              <input v-else v-model="item.nama" class="form-control">
            </td>

            <td>

              <!-- MODE NORMAL -->
              <div v-if="editIndex !== index">
                <button class="btn btn-warning btn-sm" @click="edit(index)">✏️</button>
                <button class="btn btn-info btn-sm" @click="detail(item)">🔍</button>
                <button class="btn btn-danger btn-sm" @click="hapus(index)">🗑️</button>
              </div>

              <!-- MODE EDIT -->
              <div v-else>
                <button class="btn btn-success btn-sm" @click="simpanEdit">✔️</button>
                <button class="btn btn-secondary btn-sm" @click="batalEdit">❌</button>
              </div>

            </td>
          </tr>
        </tbody>

      </table>

    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      nama: '',
      items: JSON.parse(localStorage.getItem('gudang')) || [],
      editIndex: null
    }
  },

  methods: {
    simpan() {
      localStorage.setItem('gudang', JSON.stringify(this.items));
    },

    tambah() {
      if (this.nama) {
        this.items.push({
          nama: this.nama
        });
        this.nama = '';
        this.simpan();
      }
    },

    edit(index) {
      this.editIndex = index;
    },

    simpanEdit() {
      this.editIndex = null;
      this.simpan();
    },

    batalEdit() {
      this.editIndex = null;
      this.simpan();
    },

    hapus(index) {
      this.items.splice(index,1);
      this.simpan();
    },

    detail(item) {
      alert("Masuk ke halaman detail: " + item.nama);
    }
  }

}).mount('#app');
</script>

</body>
</html>
