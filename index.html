<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gudang Simple</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

</head>
<body class="bg-light">

<div id="app" class="container py-4">

  <h3 class="text-center mb-4">📦 Data Barang Gudang</h3>

  <!-- FORM TAMBAH -->
  <div class="card mb-3">
    <div class="card-body">
      <input v-model="nama" class="form-control mb-2" placeholder="Nama barang">
      <input v-model.number="stok" type="number" class="form-control mb-2" placeholder="Stok awal">
      <button class="btn btn-primary w-100" @click="tambah">Tambah Barang</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="card">
    <div class="card-body">

      <table class="table table-bordered">
        <thead>
          <tr>
            <th>Nama Barang</th>
            <th>Stok</th>
            <th>Aksi</th>
          </tr>
        </thead>

        <tbody>
          <tr v-for="(item,index) in items" :key="index">
            <td>{{ item.nama }}</td>

            <td>
              <input type="number" v-model.number="item.stok" class="form-control">
            </td>

            <td>
              <button class="btn btn-success btn-sm" @click="simpan">Simpan</button>
              <button class="btn btn-danger btn-sm" @click="hapus(index)">Hapus</button>
            </td>
          </tr>
        </tbody>

      </table>

    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      nama: '',
      stok: 0,
      items: JSON.parse(localStorage.getItem('gudang')) || []
    }
  },
  methods: {
    simpan() {
      localStorage.setItem('gudang', JSON.stringify(this.items));
    },

    tambah() {
      if (this.nama) {
        this.items.push({
          nama: this.nama,
          stok: this.stok
        });

        this.nama = '';
        this.stok = 0;
        this.simpan();
      }
    },

    hapus(index) {
      this.items.splice(index,1);
      this.simpan();
    }
  }
}).mount('#app');
</script>

</body>
</html>
