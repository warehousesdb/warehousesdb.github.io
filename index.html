<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Gudang + Detail</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

</head>
<body class="bg-light">

<div id="app" class="container py-4">

  <h3 class="text-center mb-4">📦 Data Barang</h3>

  <!-- TAMBAH -->
  <div class="card mb-3">
    <div class="card-body">
      <input v-model="nama" class="form-control mb-2" placeholder="Nama barang">
      <button class="btn btn-primary w-100" @click="tambah">Tambah</button>
    </div>
  </div>

  <!-- LIST -->
  <div class="card">
    <div class="card-body">

      <table class="table">
        <tr v-for="(item,index) in items" :key="index">
          <td>{{ item.nama }}</td>
          <td width="160">
            <button class="btn btn-warning btn-sm" @click="edit(index)">✏️</button>
            <button class="btn btn-info btn-sm" @click="bukaDetail(index)">🔍</button>
            <button class="btn btn-danger btn-sm" @click="hapus(index)">🗑️</button>
          </td>
        </tr>
      </table>

    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div v-if="selectedIndex !== null" class="card mt-3">
    <div class="card-body">

      <h5>📄 Detail: {{ items[selectedIndex].nama }}</h5>

      <!-- INPUT TRANSAKSI -->
      <select v-model="tipe" class="form-control mb-2">
        <option value="masuk">Masuk</option>
        <option value="keluar">Keluar</option>
      </select>

      <input v-model.number="jumlah" type="number" class="form-control mb-2" placeholder="Jumlah">

      <button class="btn btn-success w-100 mb-3" @click="tambahTransaksi">
        Simpan Transaksi
      </button>

      <!-- RIWAYAT -->
      <h6>Riwayat</h6>
      <ul class="list-group">
        <li v-for="r in items[selectedIndex].riwayat" class="list-group-item">
          {{ r.tanggal }} - {{ r.tipe }} - {{ r.jumlah }}
        </li>
      </ul>

      <button class="btn btn-secondary mt-3 w-100" @click="tutupDetail">
        Tutup
      </button>

    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      nama: '',
      items: JSON.parse(localStorage.getItem('gudang')) || [],
      selectedIndex: null,
      tipe: 'masuk',
      jumlah: 0
    }
  },

  methods: {
    simpan() {
      localStorage.setItem('gudang', JSON.stringify(this.items));
    },

    tambah() {
      if (this.nama) {
        this.items.push({
          nama: this.nama,
          riwayat: []
        });
        this.nama = '';
        this.simpan();
      }
    },

    hapus(index) {
      this.items.splice(index,1);
      this.simpan();
    },

    bukaDetail(index) {
      if (!this.items[index].riwayat) {
        this.items[index].riwayat = [];
      }
      this.selectedIndex = index;
    },

    tutupDetail() {
      this.selectedIndex = null;
    },

    tambahTransaksi() {
      if (!this.jumlah) return;

      this.items[this.selectedIndex].riwayat.unshift({
        tipe: this.tipe,
        jumlah: this.jumlah,
        tanggal: new Date().toLocaleString()
      });

      this.jumlah = 0;
      this.simpan();
    }
  }

}).mount('#app');
</script>

</body>
</html>
