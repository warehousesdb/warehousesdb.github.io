<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gudang Offline</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/vue@3"></script>

</head>
<body class="bg-light">

<div id="app" class="container py-4">

  <h3 class="text-center mb-4">📦 Gudang Offline</h3>

  <!-- TAMBAH BARANG -->
  <div class="card mb-3">
    <div class="card-body">
      <input v-model="nama" class="form-control mb-2" placeholder="Nama barang">
      <input v-model.number="stok" type="number" class="form-control mb-2" placeholder="Stok awal">
      <button class="btn btn-primary w-100" @click="tambah">Tambah Barang</button>
    </div>
  </div>

  <!-- LIST BARANG -->
  <div class="card">
    <div class="card-body">

      <div v-for="(item,index) in items" :key="index" class="border rounded p-2 mb-2">

        <b>{{ item.nama }}</b><br>
        Stok: {{ item.stok }}

        <input v-model.number="item.masuk" type="number" class="form-control mt-2" placeholder="Stok masuk">
        <button class="btn btn-success btn-sm mt-1 w-100" @click="masuk(index)">➕ Masuk</button>

        <input v-model.number="item.keluar" type="number" class="form-control mt-2" placeholder="Stok keluar">
        <button class="btn btn-warning btn-sm mt-1 w-100" @click="keluar(index)">➖ Keluar</button>

        <button class="btn btn-danger btn-sm mt-2 w-100" @click="hapus(index)">Hapus</button>

      </div>

    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      nama: '',
      stok: 0,
      items: JSON.parse(localStorage.getItem('gudang')) || []
    }
  },
  methods: {
    simpan() {
      localStorage.setItem('gudang', JSON.stringify(this.items));
    },

    tambah() {
      if (this.nama && this.stok >= 0) {
        this.items.push({
          nama: this.nama,
          stok: this.stok,
          masuk: 0,
          keluar: 0
        });
        this.nama = '';
        this.stok = 0;
        this.simpan();
      }
    },

    masuk(index) {
      let item = this.items[index];
      if (item.masuk > 0) {
        item.stok += item.masuk;
        item.masuk = 0;
        this.simpan();
      }
    },

    keluar(index) {
      let item = this.items[index];
      if (item.keluar > 0 && item.stok >= item.keluar) {
        item.stok -= item.keluar;
        item.keluar = 0;
        this.simpan();
      } else {
        alert("Stok tidak cukup!");
      }
    },

    hapus(index) {
      this.items.splice(index,1);
      this.simpan();
    }
  }
}).mount('#app');
</script>

</body>
</html>
